---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

set: [pipefail]
shopt: [globstar]

vars:
  BOOTSTRAP_DIR: '{{.ROOT_DIR}}/bootstrap'
  KUBERNETES_DIR: '{{.ROOT_DIR}}/kubernetes'
  SCRIPTS_DIR: '{{.ROOT_DIR}}/scripts'
  TALOS_DIR: '{{.ROOT_DIR}}/talos'
  PRIVATE_DIR: '{{.ROOT_DIR}}/.private'
  TALOSCONFIG: '{{.ROOT_DIR}}/talos/clusterconfig/talosconfig'

env:
  KUBECONFIG: '{{.ROOT_DIR}}/kubeconfig'
  SOPS_AGE_KEY_FILE: '{{.ROOT_DIR}}/age.key'
  TALOSCONFIG: '{{.TALOSCONFIG}}'

includes:
  bootstrap: .taskfiles/bootstrap
  talos: .taskfiles/talos
  longhorn: .taskfiles/longhorn

tasks:

  default: task --list

  reconcile:
    desc: Force Flux to pull in changes from your Git repository
    cmd: flux --namespace flux-system reconcile kustomization flux-system --with-source
    preconditions:
      - test -f {{.KUBECONFIG}}
      - which flux

  dr:create-vms:
    desc: "DR: create 3 Talos VMs on Proxmox via Terraform"
    dir: '{{.TALOS_DIR}}/terraform'
    cmds:
      - terraform init -upgrade
      - terraform apply
    preconditions:
      - test -f {{.TALOS_DIR}}/terraform/terraform.tfvars

  dr:patch-talconfig:
    desc: "DR: patch talconfig.yaml with DR IPs + MACs from Terraform outputs"
    cmd: bash {{.SCRIPTS_DIR}}/gen-dr-talconfig.sh
    preconditions:
      - test -f {{.TALOS_DIR}}/terraform/terraform.tfstate
      - test -f {{.TALOS_DIR}}/talconfig.yaml

  dr:restore-talconfig:
    desc: "DR: restore prod talconfig.yaml after DR test"
    cmd: |
      test -f {{.TALOS_DIR}}/talconfig.yaml.prod-backup \
        && cp {{.TALOS_DIR}}/talconfig.yaml.prod-backup {{.TALOS_DIR}}/talconfig.yaml \
        && echo "Restored prod talconfig.yaml" \
        || echo "No backup found — nothing to restore"

  dr:destroy-vms:
    desc: "DR: destroy Talos DR VMs on Proxmox"
    dir: '{{.TALOS_DIR}}/terraform'
    cmd: terraform destroy
    preconditions:
      - test -f {{.TALOS_DIR}}/terraform/terraform.tfvars

  dr:verify:
    desc: "DR: run full verification (phase 1+2+3)"
    cmd: bash {{.SCRIPTS_DIR}}/dr-verify.sh --phase all
