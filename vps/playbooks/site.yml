---
# Split into two plays so handlers queued by docker_setup/security_hardening
# (Docker daemon restarts triggered by /etc/docker/daemon.json changes) flush
# at the end of the first play - BEFORE any service role below creates
# containers. A flush at the normal end-of-roles point (single play) happens
# AFTER traefik/garage/guacamole/authentik/etc. have already created their
# containers, and a docker daemon restart at that point can wipe them.
- name: Complete VPS Setup - Base OS, Docker & Security
  hosts: vps_servers
  become: true
  gather_facts: true

  pre_tasks:
    - name: Display starting message
      ansible.builtin.debug:
        msg: "Starting complete setup for {{ inventory_hostname }}"

  roles:
    - role: initial_setup
      tags: ['initial_setup', 'infra']

    - role: docker_setup
      tags: ['docker', 'infra']

    - role: security_hardening
      tags: ['security', 'infra']

- name: Complete VPS Setup - Services
  hosts: vps_servers
  become: true

  roles:
    - role: tailscale_exit_node
      tags: ['tailscale', 'vpn']

    - role: pihole_prereqs
      tags: ['pihole', 'dns', 'prereqs']

    - role: traefik_setup
      tags: ['traefik', 'proxy', 'services']

    - role: garage_setup
      tags: ['garage', 'storage', 'services']

    - role: guacamole_setup
      tags: ['guacamole', 'remote', 'services']

    - role: authentik_setup
      tags: ['authentik', 'sso', 'services']

    - role: cloudflared_setup
      tags: ['cloudflared', 'tunnel', 'services']

    - role: vps_backup
      tags: ['backup', 'services']

  post_tasks:
    - name: Display completion message
      ansible.builtin.debug:
        msg: "Setup finished for {{ inventory_hostname }} — infrastructure services deployed"

    - name: Display service URLs
      ansible.builtin.debug:
        msg:
          - "Traefik:      https://traefik.cloud.merox.dev"
          - "Guacamole:    https://rmt.merox.dev"
          - "Authentik:    https://sso.merox.dev"
          - "Garage S3:    https://garage.cloud.merox.dev"
          - "Garage UI:    https://garage-ui.cloud.merox.dev"
