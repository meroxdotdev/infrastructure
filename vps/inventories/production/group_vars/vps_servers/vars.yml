---
# Non-sensitive variables for VPS servers
timezone: "Europe/Bucharest"
enable_ntp: true
enable_ufw: true
allowed_ssh_port: 22

system_packages:
  - curl
  - wget
  - git
  - vim
  - htop
  - net-tools
  - ufw
  - unattended-upgrades

# Docker base dirs — Oracle Cloud layout: /srv/docker/oracle-cloud/<service>
traefik_docker_dir:      /srv/docker/oracle-cloud/traefik
guacamole_docker_dir:    /srv/docker/oracle-cloud/guacamole
authentik_docker_dir:    /srv/docker/oracle-cloud/authentik
garage_docker_dir:       /srv/docker/oracle-cloud/garage
uptime_kuma_docker_dir:  /srv/docker/oracle-cloud/uptime-kuma
netdata_docker_dir:      /srv/docker/oracle-cloud/netdata

# Routing vars needed by traefik config.yml.j2 regardless of which roles run
guacamole_domain: "rmt.merox.dev"
guacamole_ip: "172.25.10.33"
guacamole_port: 8080

# Tailscale — single source of truth for the VPS's expected tailnet identity.
# tailscale_expected_ip: used by dr-verify to detect IP drift after a DR rebuild
#   (Split DNS for *.cloud.merox.dev must be repointed if this changes).
# tailscale_authkey_expires: dr-preflight hard-fails if today >= this date —
#   renew the reusable auth key at tailscale.com/admin/settings/keys and bump
#   this date when you do.
tailscale_expected_ip: "100.72.22.38"
tailscale_authkey_expires: "2027-06-14"

# Vault variable mappings
# Convention in vault.yml is inconsistent — some keys have vault_ prefix, some don't.
# Rule: only add a mapping here when the vault key name differs from what the role expects.

# vault has: vault_tailscale_auth_key  →  role expects: tailscale_auth_key
tailscale_auth_key: "{{ vault_tailscale_auth_key }}"

# vault has: authentik_pg_pass  →  role/template expects: authentik_db_password
authentik_db_password: "{{ authentik_pg_pass }}"

# All other secrets (cloudflare_api_token, cloudflare_email, traefik_dashboard_credentials,
# pihole_webpassword, authentik_secret_key, garage_rpc_secret, garage_admin_token,
# cloudflare_tunnel_token) are loaded directly from vault with the correct names —
# no mapping needed.
