---
- name: Detect Tailscale IP address
  shell: ip -4 addr show tailscale0 | grep inet | awk '{print $2}' | cut -d/ -f1
  register: tailscale_ip_result
  changed_when: false
  failed_when: tailscale_ip_result.stdout == ""

- name: Set Tailscale IP as fact
  set_fact:
    tailscale_ip: "{{ tailscale_ip_result.stdout }}"

# The git module can only clone into a missing or empty directory. On a
# fresh server (or after a DR restore) other roles create subdirectories
# under app_stack_dir (e.g. authentik/, guacamole/, garage/) before this
# role runs, so a plain `git: clone` here fails with "destination path
# already exists and is not an empty directory". Work around it by cloning
# to a temp dir and merging it in when app_stack_dir isn't a git repo yet.
- name: Check if app stack directory is already a git repository
  ansible.builtin.stat:
    path: "{{ app_stack_dir }}/.git"
  register: app_stack_git_check

- name: Clone cloudlab-merox repository into a temporary directory (first-time setup)
  ansible.builtin.git:
    repo: "{{ app_stack_repo_url }}"
    dest: "{{ app_stack_tmp_clone_dir }}"
    version: "{{ app_stack_repo_branch }}"
  become: yes
  when: not app_stack_git_check.stat.exists

- name: Ensure app stack directory exists
  ansible.builtin.file:
    path: "{{ app_stack_dir }}"
    state: directory
    mode: '0755'
  become: yes
  when: not app_stack_git_check.stat.exists

- name: Merge cloned repository into app stack directory
  ansible.builtin.command: cp -a {{ app_stack_tmp_clone_dir }}/. {{ app_stack_dir }}/
  become: yes
  changed_when: true
  when: not app_stack_git_check.stat.exists

- name: Clean up temporary clone directory
  ansible.builtin.file:
    path: "{{ app_stack_tmp_clone_dir }}"
    state: absent
  become: yes
  when: not app_stack_git_check.stat.exists

- name: Update cloudlab-merox app stack repository
  ansible.builtin.git:
    repo: "{{ app_stack_repo_url }}"
    dest: "{{ app_stack_dir }}"
    version: "{{ app_stack_repo_branch }}"
    update: yes
  become: yes

- name: Deploy app stack .env file
  template:
    src: env.j2
    dest: "{{ app_stack_dir }}/.env"
    mode: '0600'
    owner: root
    group: root
  become: yes
  notify: Restart app stack

- name: Deploy Homepage widget secrets (homepage.env)
  template:
    src: homepage-env.j2
    dest: "{{ app_stack_dir }}/homepage.env"
    mode: '0600'
    owner: root
    group: root
  become: yes
  notify: Restart app stack

# - network-cloud-merox is created by traefik_setup outside of Compose, so
#   the root compose's own (non-external) network definition would otherwise
#   fail with a com.docker.compose.network label mismatch.
# - portainer's ports/dns are hardcoded in the cloudlab-merox repo to the
#   previous server's Tailscale IP, which changes on every DR rebuild.
- name: Deploy docker-compose.override.yml (external network + Tailscale IP)
  ansible.builtin.template:
    src: docker-compose.override.yml.j2
    dest: "{{ app_stack_dir }}/docker-compose.override.yml"
    mode: '0644'
    owner: root
    group: root
  become: yes
  notify: Restart app stack

- name: Start app stack containers (root compose)
  community.docker.docker_compose_v2:
    project_src: "{{ app_stack_dir }}"
    state: present
  become: yes
  when: not ansible_check_mode

- name: Start agents-dashboard containers
  community.docker.docker_compose_v2:
    project_src: "{{ app_stack_dir }}/agents-dashboard"
    state: present
  become: yes
  when: not ansible_check_mode
