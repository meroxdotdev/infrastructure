---
- name: Create Glances directory
  file:
    path: "{{ glances_docker_dir }}"
    state: directory
    mode: "0755"

- name: Deploy Glances docker-compose.yml
  template:
    src: docker-compose.yml.j2
    dest: "{{ glances_docker_dir }}/docker-compose.yml"
    mode: "0644"
  notify: Restart glances

- name: Start Glances
  community.docker.docker_compose_v2:
    project_src: "{{ glances_docker_dir }}"
    state: present
  when: not ansible_check_mode
