---
- name: Create Joplin directory
  file:
    path: "{{ joplin_docker_dir }}"
    state: directory
    mode: "0755"

- name: Deploy Joplin docker-compose.yml
  template:
    src: docker-compose.yml.j2
    dest: "{{ joplin_docker_dir }}/docker-compose.yml"
    mode: "0644"
  no_log: true
  notify: Restart joplin

- name: Start Joplin containers
  community.docker.docker_compose_v2:
    project_src: "{{ joplin_docker_dir }}"
    state: present
  when: not ansible_check_mode

- name: Wait for Joplin to be ready
  wait_for:
    port: "{{ joplin_app_port }}"
    host: "{{ joplin_server_ip }}"
    delay: 10
    timeout: 180

- name: Deploy Joplin DB backup script
  template:
    src: backup-joplin.sh.j2
    dest: /usr/local/bin/backup-joplin.sh
    owner: root
    group: root
    mode: "0700"
  no_log: true
  tags: backup

- name: Schedule daily Joplin DB backup
  cron:
    name: "joplin-db-backup"
    minute: "20"
    hour: "1"
    job: "/usr/local/bin/backup-joplin.sh >> /var/log/joplin-backup.log 2>&1"
    user: root
  tags: backup
