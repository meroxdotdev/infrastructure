---
- name: Detect Tailscale IP address
  shell: ip -4 addr show tailscale0 | grep inet | awk '{print $2}' | cut -d/ -f1
  register: tailscale_ip_result
  changed_when: false
  failed_when: tailscale_ip_result.stdout == ""

- name: Set Tailscale IP as fact
  set_fact:
    tailscale_ip: "{{ tailscale_ip_result.stdout }}"

- name: Create Uptime Kuma directory
  file:
    path: "{{ uptime_kuma_docker_dir }}"
    state: directory
    mode: "0755"

- name: Deploy Uptime Kuma docker-compose.yml
  template:
    src: docker-compose.yml.j2
    dest: "{{ uptime_kuma_docker_dir }}/docker-compose.yml"
    mode: "0644"
  notify: Restart uptime-kuma

- name: Start Uptime Kuma
  community.docker.docker_compose_v2:
    project_src: "{{ uptime_kuma_docker_dir }}"
    state: present
  when: not ansible_check_mode

- name: Wait for Uptime Kuma to be ready
  wait_for:
    port: "{{ uptime_kuma_port }}"
    host: "{{ uptime_kuma_ip }}"
    delay: 5
    timeout: 60
