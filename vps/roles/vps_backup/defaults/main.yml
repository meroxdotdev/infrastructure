---
# Local staging for all VPS backups (dumps + tars), pushed nightly to R730xd
vps_backup_root: /srv/backups
vps_backup_retention_days: 7

# R730xd (pve) - always-on backup hub, reachable over the Tailscale-routed LAN.
# Plain SSH rsync push, no daemon indirection - that was only needed for
# Synology's patched rsync refusing server-mode over SSH; R730xd is plain
# Debian and has no such restriction. Public key is restricted on the pve side
# via rrsync + from= (see proxmox/r730xd/README.md) - not ansible-managed,
# pve isn't in this inventory.
vps_backup_r730xd_user: root
vps_backup_r730xd_host: 10.57.57.250
vps_backup_r730xd_ssh_key: /root/.ssh/oracle-vps-to-r730xd
vps_backup_r730xd_base: /media/backups/oracle-vps
