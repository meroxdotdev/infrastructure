---
# VPS backup plumbing: local staging of service state not covered by
# Ansible/git, plus the nightly off-site sync to the Synology NAS.
# Note: /etc/rsyncd.secrets and the SSH key to the NAS are NOT managed here —
# they are provisioned once, manually (see role README).

- name: Detect Tailscale IP address
  shell: ip -4 addr show tailscale0 | grep inet | awk '{print $2}' | cut -d/ -f1
  register: tailscale_ip_result
  changed_when: false
  failed_when: tailscale_ip_result.stdout == ""
  tags: backup

- name: Set Tailscale IP as fact
  set_fact:
    tailscale_ip: "{{ tailscale_ip_result.stdout }}"
  tags: backup

- name: Ensure backup root exists
  file:
    path: "{{ vps_backup_root }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
  tags: backup

- name: Ensure /root/.ssh directory exists
  file:
    path: /root/.ssh
    state: directory
    owner: root
    group: root
    mode: "0700"
  tags: backup

- name: Deploy NAS backup SSH private key
  copy:
    content: "{{ nas_backup_ssh_key_content }}"
    dest: "{{ vps_backup_nas_ssh_key }}"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  tags: backup

- name: Deploy rsyncd config (HyperBackup target + read-only backup modules)
  template:
    src: rsyncd.conf.j2
    dest: /etc/rsyncd.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart rsync daemon
  tags: backup

- name: Deploy VPS extras backup script (guacamole/traefik/pihole/openclaw)
  template:
    src: backup-vps-extras.sh.j2
    dest: /usr/local/bin/backup-vps-extras.sh
    owner: root
    group: root
    mode: "0700"
  tags: backup

- name: Deploy DB restore script (authentik/joplin, interactive)
  template:
    src: restore-db.sh.j2
    dest: /usr/local/bin/restore-db.sh
    owner: root
    group: root
    mode: "0700"
  tags: backup

- name: Deploy NAS sync script
  template:
    src: backup-push-nas.sh.j2
    dest: /usr/local/bin/backup-push-nas.sh
    owner: root
    group: root
    mode: "0700"
  tags: backup

- name: Deploy restore-pull-from-nas script (DR)
  template:
    src: restore-pull-from-nas.sh.j2
    dest: /usr/local/bin/restore-pull-from-nas.sh
    owner: root
    group: root
    mode: "0700"
  tags: backup

- name: Deploy restore-extras script (DR)
  template:
    src: restore-extras.sh.j2
    dest: /usr/local/bin/restore-extras.sh
    owner: root
    group: root
    mode: "0700"
  tags: backup

- name: Deploy Joplin DB backup script
  template:
    src: backup-joplin.sh.j2
    dest: /usr/local/bin/backup-joplin.sh
    owner: root
    group: root
    mode: "0700"
  tags: backup

- name: Schedule daily Joplin DB backup
  cron:
    name: "joplin-db-backup"
    minute: "20"
    hour: "1"
    job: "/usr/local/bin/backup-joplin.sh >> /var/log/joplin-backup.log 2>&1"
    user: root
  tags: backup

- name: Schedule daily VPS extras backup
  cron:
    name: "vps-extras-backup"
    minute: "30"
    hour: "1"
    job: "/usr/local/bin/backup-vps-extras.sh >> /var/log/vps-extras-backup.log 2>&1"
    user: root
  tags: backup

- name: Schedule nightly backup sync to NAS (after Longhorn 02:00 cycle)
  cron:
    name: "backup-sync-nas"
    minute: "30"
    hour: "3"
    job: "/usr/local/bin/backup-push-nas.sh >> /var/log/backup-nas.log 2>&1"
    user: root
  tags: backup
