---
- name: Create Authentik directory
  file:
    path: "{{ authentik_docker_dir }}"
    state: directory
    mode: "0755"

- name: Deploy Authentik docker-compose.yml
  template:
    src: docker-compose.yml.j2
    dest: "{{ authentik_docker_dir }}/docker-compose.yml"
    mode: "0640"
  no_log: true
  notify: Restart authentik

- name: Start Authentik
  community.docker.docker_compose_v2:
    project_src: "{{ authentik_docker_dir }}"
    state: present

- name: Wait for Authentik server to be ready
  wait_for:
    port: "{{ authentik_port }}"
    host: "{{ authentik_server_ip }}"
    delay: 15
    timeout: 120

- name: Deploy Authentik DB backup script
  template:
    src: backup-authentik.sh.j2
    dest: /usr/local/bin/backup-authentik.sh
    owner: root
    group: root
    mode: "0700"
  no_log: true
  tags: backup

- name: Schedule daily Authentik DB backup
  cron:
    name: "authentik-db-backup"
    minute: "15"
    hour: "1"
    job: "/usr/local/bin/backup-authentik.sh >> /var/log/authentik-backup.log 2>&1"
    user: root
  tags: backup
