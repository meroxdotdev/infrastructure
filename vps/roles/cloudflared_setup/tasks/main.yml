---
- name: Check if legacy systemd cloudflared service is active
  systemd:
    name: cloudflared
  register: cloudflared_systemd_status
  failed_when: false

- name: Stop and disable legacy systemd cloudflared service
  systemd:
    name: cloudflared
    state: stopped
    enabled: false
  when: cloudflared_systemd_status.status.ActiveState == "active"

- name: Create cloudflared directory
  file:
    path: "{{ cloudflared_docker_dir }}"
    state: directory
    mode: '0755'
  become: yes

- name: Deploy cloudflared .env file (tunnel token)
  template:
    src: cloudflared.env.j2
    dest: "{{ cloudflared_docker_dir }}/.env"
    mode: '0600'
  no_log: true
  notify: Restart cloudflared

- name: Deploy cloudflared docker-compose.yml
  template:
    src: docker-compose.yml.j2
    dest: "{{ cloudflared_docker_dir }}/docker-compose.yml"
    mode: '0644'
  notify: Restart cloudflared

- name: Start cloudflared container
  community.docker.docker_compose_v2:
    project_src: "{{ cloudflared_docker_dir }}"
    state: present
  when: not ansible_check_mode
