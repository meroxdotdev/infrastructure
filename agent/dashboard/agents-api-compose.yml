services:
  agents-api:
    image: python:3.12-alpine
    container_name: agents-api
    restart: unless-stopped
    command: python /app/api-server.py
    env_file:
      - /srv/dashboard/.env
    environment:
      - API_PORT=8765
    volumes:
      - /srv/dashboard/api-server.py:/app/api-server.py:ro
      - /home/openclaw/.openclaw/logs:/logs:ro
      - /srv/dashboard/run-triggers:/triggers
    networks:
      network-cloud-merox:
        ipv4_address: 172.25.10.92
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.agents-api.rule=Host(`agents.cloud.merox.dev`) && PathPrefix(`/api/`)"
      - "traefik.http.routers.agents-api.entrypoints=https"
      - "traefik.http.routers.agents-api.tls.certresolver=cloudflare"
      - "traefik.http.routers.agents-api.priority=100"
      - "traefik.http.services.agents-api.loadbalancer.server.port=8765"

networks:
  network-cloud-merox:
    external: true
