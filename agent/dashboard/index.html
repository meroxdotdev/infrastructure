<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merox — Dashboard</title>
<style>
:root {
  --bg:     #0d0d10;
  --surface:#141418;
  --surface2:#1a1a20;
  --border: rgba(255,255,255,.07);
  --border2:rgba(255,255,255,.11);
  --t1: #f0f0f5;
  --t2: #9090a8;
  --t3: #55556a;
  --green:  #22c55e;
  --yellow: #eab308;
  --red:    #ef4444;
  --blue:   #3b82f6;
  --accent: #6366f1;
  --r: 14px;
  --r2: 8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{overflow-x:hidden;}
body{
  background:var(--bg);
  color:var(--t1);
  font-family:-apple-system,'Inter',system-ui,sans-serif;
  font-size:14px;
  line-height:1.5;
  min-height:100vh;
}

/* ── HEADER ── */
.hdr{
  position:sticky;top:0;z-index:100;
  background:rgba(13,13,16,.85);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  height:52px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;
  gap:16px;
}
.hdr-logo{font-size:15px;font-weight:700;letter-spacing:-.4px;color:var(--t1);}
.hdr-logo span{color:var(--accent);}
.hdr-right{display:flex;align-items:center;gap:14px;}
.hdr-clock{font-size:13px;color:var(--t3);font-variant-numeric:tabular-nums;letter-spacing:.02em;}
.hdr-cd{font-size:12px;color:var(--t3);font-variant-numeric:tabular-nums;}
.btn{
  background:var(--surface2);
  border:1px solid var(--border2);
  color:var(--t2);
  padding:5px 14px;
  border-radius:var(--r2);
  cursor:pointer;
  font-size:12px;
  font-family:inherit;
  transition:border-color .15s,color .15s;
}
.btn:hover{border-color:var(--accent);color:var(--t1);}

/* ── MAIN LAYOUT ── */
.main{
  max-width:1280px;
  margin:0 auto;
  padding:24px 24px 48px;
  display:flex;
  flex-direction:column;
  gap:20px;
}

/* ── PERSONAL ROW ── */
.personal-row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:16px;
}
@media(max-width:900px){.personal-row{grid-template-columns:1fr 1fr;}}
@media(max-width:580px){.personal-row{grid-template-columns:1fr;}}

/* ── CARD ── */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:20px;
}
.card-title{
  font-size:11px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:.9px;
  color:var(--t3);
  margin-bottom:16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.card-title-badge{
  font-size:10px;
  font-weight:500;
  text-transform:none;
  letter-spacing:0;
  color:var(--t3);
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:6px;
  padding:2px 8px;
}

/* ── WEATHER ── */
.w-current{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
.w-icon{font-size:44px;line-height:1;flex-shrink:0;}
.w-temp{font-size:38px;font-weight:700;line-height:1;letter-spacing:-1px;}
.w-desc{font-size:13px;color:var(--t2);margin-top:3px;}
.w-loc{font-size:11px;color:var(--t3);margin-top:2px;}
.w-days{display:flex;gap:8px;}
.w-day{
  flex:1;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--r2);
  padding:10px 8px;
  text-align:center;
  display:flex;flex-direction:column;gap:4px;
  align-items:center;
}
.w-day-name{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;}
.w-day-emoji{font-size:20px;line-height:1;}
.w-day-temp{font-size:12px;font-weight:600;}
.w-day-min{color:var(--t3);font-weight:400;font-size:11px;}
.w-stats{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
.w-stat{display:flex;flex-direction:column;gap:1px;}
.w-stat-label{font-size:10px;color:var(--t3);}
.w-stat-val{font-size:12px;color:var(--t2);}

/* ── CALENDAR ── */
.cal-empty{color:var(--t3);font-size:13px;padding:12px 0;}
.cal-day-label{
  font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;
  color:var(--t3);margin-bottom:8px;margin-top:12px;
}
.cal-day-label:first-child{margin-top:0;}
.cal-day-label.today{color:var(--blue);}
.cal-event{
  display:flex;gap:10px;align-items:baseline;
  padding:5px 0;
  border-bottom:1px solid var(--border);
  font-size:13px;
}
.cal-event:last-child{border-bottom:none;}
.cal-time{font-size:11px;color:var(--t3);min-width:52px;flex-shrink:0;}
.cal-name{color:var(--t1);flex:1;}

/* ── TODOS ── */
.todo-list-name{
  font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;
  color:var(--t3);margin-bottom:8px;
}
.todo-item{
  display:flex;align-items:center;gap:10px;
  padding:7px 0;
  border-bottom:1px solid var(--border);
  font-size:13px;
}
.todo-item:last-child{border-bottom:none;}
.todo-circle{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;}
.todo-text{flex:1;color:var(--t1);}
.todo-date{font-size:11px;color:var(--t3);}
.todo-empty{font-size:13px;color:var(--t3);padding:12px 0;}

/* ── STATUS BAR ── */
.status-bar{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:0 20px;
  height:52px;
  display:flex;align-items:center;gap:0;
  overflow-x:auto;
  scrollbar-width:none;
}
.status-bar::-webkit-scrollbar{display:none;}
.sb-item{
  display:flex;align-items:center;gap:8px;
  padding:0 20px;
  border-right:1px solid var(--border);
  height:100%;
  flex-shrink:0;
  white-space:nowrap;
}
.sb-item:first-child{padding-left:0;}
.sb-item:last-child{border-right:none;}
.sb-label{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;}
.sb-value{font-size:14px;font-weight:600;color:var(--t1);}
.sb-value.ok{color:var(--green);}
.sb-value.warn{color:var(--yellow);}
.sb-value.err{color:var(--red);}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dot-ok{background:var(--green);box-shadow:0 0 6px rgba(34,197,94,.5);}
.dot-warn{background:var(--yellow);}
.dot-err{background:var(--red);box-shadow:0 0 6px rgba(239,68,68,.5);}
.dot-idle{background:var(--surface2);border:1px solid var(--border2);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.pulse{animation:pulse 2.5s ease-in-out infinite;}

/* ── ALERTS ── */
.alert{
  display:flex;align-items:flex-start;gap:12px;
  padding:14px 18px;
  border-radius:var(--r);
  border:1px solid;
  text-decoration:none;color:inherit;
  transition:filter .15s;
}
.alert:hover{filter:brightness(1.07);}
.alert-crit{background:rgba(239,68,68,.07);border-color:rgba(239,68,68,.22);}
.alert-warn{background:rgba(234,179,8,.06);border-color:rgba(234,179,8,.2);}
.alert-ok{background:rgba(34,197,94,.05);border-color:rgba(34,197,94,.18);}
.alert-body{flex:1;min-width:0;}
.alert-title{font-size:13px;font-weight:500;}
.alert-meta{font-size:11px;color:var(--t3);margin-top:2px;}
.alert-badge{
  flex-shrink:0;font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:.5px;padding:3px 7px;border-radius:5px;align-self:flex-start;margin-top:1px;
}
.b-crit{background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.25);}
.b-warn{background:rgba(234,179,8,.13);color:#fde047;border:1px solid rgba(234,179,8,.25);}
.b-ok{background:rgba(34,197,94,.1);color:#86efac;border:1px solid rgba(34,197,94,.2);}
.alert-x{
  flex-shrink:0;background:none;border:none;color:var(--t3);
  cursor:pointer;font-size:14px;padding:2px 4px;border-radius:4px;
  opacity:.5;transition:opacity .15s;align-self:flex-start;
}
.alert-x:hover{opacity:1;}

/* ── 2-COL ── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
@media(max-width:900px){.two-col{grid-template-columns:1fr;}}

/* ── NEWS ── */
.news-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:9px 0;
  border-bottom:1px solid var(--border);
  text-decoration:none;color:inherit;
  border-radius:var(--r2);
  transition:background .1s;
}
.news-item:last-child{border-bottom:none;}
.news-item:hover .news-title{color:var(--accent);}
.news-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.nd-crit{background:var(--red);box-shadow:0 0 4px rgba(239,68,68,.5);}
.nd-warn{background:var(--yellow);}
.nd-info{background:var(--t3);}
.news-title{font-size:13px;line-height:1.4;flex:1;}
.news-meta{font-size:11px;color:var(--t3);margin-top:2px;}
.news-arr{color:var(--t3);font-size:11px;flex-shrink:0;margin-top:3px;}

/* ── AGENTS ── */
.agent-item{
  display:flex;align-items:flex-start;gap:12px;
  padding:10px 0;
  border-bottom:1px solid var(--border);
}
.agent-item:last-child{border-bottom:none;}
.agent-icon{font-size:18px;width:24px;text-align:center;flex-shrink:0;margin-top:1px;}
.agent-body{flex:1;min-width:0;}
.agent-name{font-size:13px;font-weight:600;color:var(--t1);}
.agent-sum{font-size:12px;color:var(--t2);margin-top:2px;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.agent-meta{font-size:11px;color:var(--t3);margin-top:3px;}
.agent-right{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.sbadge{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:2px 7px;border-radius:5px;}
.sb-ok{background:rgba(34,197,94,.1);color:#86efac;border:1px solid rgba(34,197,94,.18);}
.sb-err{background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.18);}
.sb-warn{background:rgba(234,179,8,.1);color:#fde047;border:1px solid rgba(234,179,8,.2);}
.sb-idle{background:rgba(85,85,106,.12);color:var(--t3);border:1px solid var(--border2);}
.agent-next{font-size:10px;color:var(--t3);}
.agent-next.soon{color:#fbbf24;font-weight:500;}

/* ── NODES ── */
.node-item{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border);}
.node-item:last-child{border-bottom:none;}
.node-name{font-size:13px;font-weight:500;flex:1;}
.node-meta{font-size:11px;color:var(--t3);}
.node-bars{display:flex;gap:8px;flex-shrink:0;}
.bar-pill{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t2);}
.bar-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;}
.bar-track{width:60px;height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;}
.bar-fill{height:100%;border-radius:2px;}

/* ── STORAGE ── */
.storage-item{padding:10px 0;border-bottom:1px solid var(--border);}
.storage-item:last-child{border-bottom:none;}
.storage-hdr{display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px;}
.storage-name{color:var(--t2);}
.storage-val{color:var(--t3);font-variant-numeric:tabular-nums;}
.bar-track-full{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;}
.bar-fill-full{height:100%;border-radius:2px;}

/* ── UPGRADES ── */
.upg-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:9px 10px;
  border-radius:var(--r2);
  border:1px solid;
  text-decoration:none;color:inherit;
  margin-bottom:6px;
  transition:filter .15s;
}
.upg-item:hover{filter:brightness(1.08);}
.upg-item:last-child{margin-bottom:0;}
.upg-breaking{background:rgba(239,68,68,.05);border-color:rgba(239,68,68,.2);}
.upg-minor{background:rgba(59,130,246,.04);border-color:rgba(59,130,246,.15);}
.upg-patch{background:rgba(85,85,106,.05);border-color:rgba(85,85,106,.15);}
.upg-pkg{font-size:13px;font-weight:600;flex:1;}
.upg-versions{font-size:11px;color:var(--t3);margin-top:2px;}
.upg-badge{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:2px 7px;border-radius:5px;flex-shrink:0;}
.upg-b-breaking{background:rgba(239,68,68,.14);color:#fca5a5;border:1px solid rgba(239,68,68,.22);}
.upg-b-minor{background:rgba(59,130,246,.12);color:#93c5fd;border:1px solid rgba(59,130,246,.2);}
.upg-b-patch{background:rgba(85,85,106,.1);color:var(--t2);border:1px solid var(--border2);}

/* ── MISC ── */
.empty{font-size:12px;color:var(--t3);padding:12px 0;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

@media(max-width:580px){
  .hdr{padding:0 16px;}
  .main{padding:16px 16px 40px;}
  .hdr-cd{display:none;}
  .btn span{display:none;}
  .node-bars{display:none;}
  .card{padding:16px;}
  .status-bar{padding:0 16px;}
  .sb-item{padding:0 14px;}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-logo">merox<span>.</span>dev</div>
  <div class="hdr-right">
    <span class="hdr-cd" id="countdown">↻ 5:00</span>
    <button class="btn" onclick="loadAll()">↻ <span>Refresh</span></button>
    <span class="hdr-clock" id="clock">--:--</span>
  </div>
</header>

<main class="main">

  <!-- STATUS BAR -->
  <div class="status-bar" id="status-bar">
    <div class="sb-item"><span class="sb-label">Nodes</span><span class="sb-value" id="sb-nodes">—</span></div>
    <div class="sb-item"><span class="sb-label">Pods</span><span class="sb-value" id="sb-pods">—</span></div>
    <div class="sb-item"><span class="sb-label">Flux</span><span class="sb-value" id="sb-flux">—</span></div>
    <div class="sb-item"><span class="sb-label">Disk</span><span class="sb-value" id="sb-disk">—</span></div>
    <div class="sb-item"><span class="sb-label">Docker</span><span class="sb-value" id="sb-docker">—</span></div>
    <div class="sb-item"><span class="sb-label">Agenți</span><span class="sb-value" id="sb-agents">—</span></div>
  </div>

  <!-- PERSONAL ROW: Weather | Calendar | Todos -->
  <div class="personal-row">

    <!-- WEATHER -->
    <div class="card" id="weather-card" style="display:none">
      <div class="card-title">Vreme <span class="card-title-badge" id="weather-upd">—</span></div>
      <div id="weather-content"></div>
    </div>

    <!-- CALENDAR -->
    <div class="card" id="calendar-card" style="display:none">
      <div class="card-title">Calendar <span class="card-title-badge" id="calendar-tag">—</span></div>
      <div id="calendar-content"><div class="empty">Se încarcă…</div></div>
    </div>

    <!-- TODOS -->
    <div class="card" id="reminders-card" style="display:none">
      <div class="card-title">Liste <span class="card-title-badge" id="reminders-tag">—</span></div>
      <div id="reminders-content"><div class="empty">Se încarcă…</div></div>
    </div>

  </div>

  <!-- ALERTS -->
  <div id="alerts" style="display:flex;flex-direction:column;gap:8px;"></div>

  <!-- UPGRADES -->
  <div class="card" id="upgrades-section" style="display:none">
    <div class="card-title">Upgrade-uri Renovate <span class="card-title-badge" id="upgrades-meta">—</span></div>
    <div id="upgrades-list"></div>
  </div>

  <!-- NEWS -->
  <div class="card" id="news-card">
    <div class="card-title">News <span class="card-title-badge" id="news-meta">—</span></div>
    <div id="news-list"></div>
  </div>

  <!-- AGENTS (full width, 2-col grid inside) -->
  <div class="card">
    <div class="card-title">Agenți AI <span class="card-title-badge" id="agents-tag">—</span></div>
    <div id="agent-network"></div>
  </div>

  <!-- VPS Oracle Cloud -->
  <div class="card">
    <div class="card-title">VPS — Oracle Cloud <span class="card-title-badge" id="vps-tag">—</span></div>
    <div id="vps-content"></div>
  </div>

  <!-- HOMELAB -->
  <div class="two-col">
    <div class="card">
      <div class="card-title">Homelab — K8s Cluster <span class="card-title-badge" id="infra-tag">—</span></div>
      <div id="nodes-list"></div>
    </div>
    <div class="card">
      <div class="card-title">Storage & Backup <span class="card-title-badge" id="bkp-tag">—</span></div>
      <div id="storage-content"></div>
    </div>
  </div>

</main>

<script>
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function barColor(p){return p<60?'var(--green)':p<80?'var(--yellow)':'var(--red)';}
function fmtKB(kb){if(!kb)return'?';const gb=kb/1024/1024;if(gb>=1)return gb.toFixed(1)+'G';return(kb/1024).toFixed(0)+'M';}
function fmtTime(iso){if(!iso)return null;try{const d=new Date(iso);const now=new Date();const diff=Math.round((now-d)/60000);if(diff<1)return'acum';if(diff<60)return'acum '+diff+'m';if(diff<1440)return'acum '+Math.floor(diff/60)+'h';return d.toLocaleDateString('ro-RO',{day:'numeric',month:'short'});}catch{return null;}}

// Clock
function tick(){
  const t=new Date().toLocaleTimeString('ro-RO',{timeZone:'Europe/Bucharest',hour12:false,hour:'2-digit',minute:'2-digit'});
  document.getElementById('clock').textContent=t;
}
setInterval(tick,10000);tick();

// Countdown
const REFRESH=300;
let cd=REFRESH;
function fmtCD(s){const m=Math.floor(s/60),sec=s%60;return'↻ '+m+':'+(sec<10?'0':'')+sec;}
setInterval(()=>{cd--;const el=document.getElementById('countdown');if(el)el.textContent=fmtCD(cd);if(cd<=0){cd=REFRESH;loadAll();}},1000);

async function fetchJ(url){const r=await fetch(url+'?_='+Date.now());if(!r.ok)throw new Error(r.status);return r.json();}

// ── Agent defs ──
const AGENT_DEFS=[
  {key:'orchestrator',icon:'🎛️',name:'Orchestrator',role:'supervises all agents',schedule:{h:[12],m:0,dow:null}},
  {key:'news',        icon:'📰',name:'News',         role:'stack updates & tech news',schedule:{h:[4],m:0,dow:null}},
  {key:'infra',       icon:'☸️',name:'Infra',         role:'cluster health monitoring',schedule:{h:[8,20],m:0,dow:null}},
  {key:'costs',       icon:'💰',name:'Costs',         role:'storage & backup checks',  schedule:{h:[9],m:0,dow:[0]}},
  {key:'dashboard',   icon:'🖥️',name:'Dashboard',    role:'updates this page',         schedule:{h:[23],m:0,dow:null}},
  {key:'blog',        icon:'✍️',name:'Blog',          role:'content generation',        schedule:{h:[9],m:0,dow:[1]}},
  {key:'design',      icon:'🎨',name:'Design',        role:'UI/UX suggestions',         schedule:null},
];

function nextRunDate(s){
  if(!s)return null;
  const now=new Date(),best=[];
  for(const h of s.h){
    for(let d=0;d<=7;d++){
      const c=new Date(now);
      c.setUTCHours(h,s.m,0,0);c.setUTCDate(c.getUTCDate()+d);
      if(c<=now)continue;
      if(s.dow&&!s.dow.includes(c.getUTCDay()))continue;
      best.push(c);
    }
  }
  return best.length?best.sort((a,b)=>a-b)[0]:null;
}
function fmtNextRun(s){
  const next=nextRunDate(s);
  if(!next)return'';
  const mins=Math.round((next-new Date())/60000);
  if(mins<1)return'acum';if(mins<60)return'în '+mins+'m';
  const h=Math.floor(mins/60),m=mins%60;
  if(h<24)return m?'în '+h+'h '+m+'m':'în '+h+'h';
  const days=Math.floor(h/24),rh=h%24;
  return rh?'în '+days+'z '+rh+'h':'în '+days+'z';
}
function updateNextRunLabels(){
  AGENT_DEFS.forEach(d=>{
    const el=document.getElementById('nr-'+d.key);
    if(!el||!d.schedule)return;
    const next=nextRunDate(d.schedule);
    const mins=next?Math.round((next-new Date())/60000):9999;
    el.textContent='⏱ '+fmtNextRun(d.schedule);
    el.className='agent-next'+(mins<60?' soon':'');
  });
}
setInterval(updateNextRunLabels,60000);

// ── Alert dismiss ──
function getDismissed(){
  try{const today=new Date().toISOString().slice(0,10);const d=JSON.parse(localStorage.getItem('da2')||'{}');return d.date===today?new Set(d.ids):new Set();}catch{return new Set();}
}
function saveD(id){
  try{const today=new Date().toISOString().slice(0,10);const d=JSON.parse(localStorage.getItem('da2')||'{}');const ids=d.date===today?(d.ids||[]):[];ids.push(id);localStorage.setItem('da2',JSON.stringify({date:today,ids}));}catch{}
}
function dismissAlert(id){
  saveD(id);
  const el=document.querySelector(`[data-aid="${CSS.escape(id)}"]`);
  if(el){el.style.transition='opacity .2s';el.style.opacity='0';setTimeout(()=>el.remove(),220);}
}

// ── RENDER: Weather ──
function renderWeather(w){
  const card=document.getElementById('weather-card');
  if(!w||!w.current){card.style.display='none';return;}
  card.style.display='';
  const c=w.current;
  const upd=w.updatedAt?Math.round((Date.now()-new Date(w.updatedAt))/60000):null;
  document.getElementById('weather-upd').textContent=upd!=null?(upd<2?'acum':upd+'m ago'):'';
  const dirs=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSO','SO','OSO','O','ONO','NO','NNO'];
  const wd=dirs[Math.round(c.wind_dir/22.5)%16]||'';
  const days=w.daily||[];
  document.getElementById('weather-content').innerHTML=`
    <div class="w-current">
      <div class="w-icon">${c.icon}</div>
      <div>
        <div class="w-temp">${Math.round(c.temp)}°</div>
        <div class="w-desc">${esc(c.description)}</div>
        <div class="w-loc">${esc(w.location)}</div>
      </div>
    </div>
    <div class="w-days">
      ${days.map((d,i)=>{
        const dt=new Date(d.date+'T12:00:00');
        const lbl=i===0?'Azi':dt.toLocaleDateString('ro-RO',{weekday:'short'});
        return `<div class="w-day">
          <div class="w-day-name">${lbl}</div>
          <div class="w-day-emoji">${d.emoji}</div>
          <div class="w-day-temp">${Math.round(d.max)}° <span class="w-day-min">${Math.round(d.min)}°</span></div>

      }).join('')}

    <div class="w-stats">
      <div class="w-stat"><div class="w-stat-label">Umiditate</div><div class="w-stat-val">${c.humidity}%</div></div>
      <div class="w-stat"><div class="w-stat-label">Vânt</div><div class="w-stat-val">${c.wind_kmh} km/h ${wd}</div></div>
      <div class="w-stat"><div class="w-stat-label">Percepuți</div><div class="w-stat-val">${c.feels_like}°C</div></div>
      ${c.precipitation>0?`<div class="w-stat"><div class="w-stat-label">Precipitații</div><div class="w-stat-val">${c.precipitation} mm</div></div>`:''}
    </div>`;
}

// ── RENDER: Calendar ──
function renderCalendar(cal){
  const card=document.getElementById('calendar-card');
  const content=document.getElementById('calendar-content');
  if(!cal||!cal.days){card.style.display='none';return;}
  card.style.display='';
  const total=cal.totalEvents||0;
  document.getElementById('calendar-tag').textContent=total?total+' ev':'Liber';
  if(!cal.days.length){content.innerHTML='<div class="cal-empty">Niciun eveniment în 7 zile 🎉</div>';return;}
  const today=new Date().toISOString().slice(0,10);
  const tomorrow=new Date(Date.now()+86400000).toISOString().slice(0,10);
  content.innerHTML=cal.days.map(day=>{
    const isToday=day.date===today;
    const isTomorrow=day.date===tomorrow;
    const dt=new Date(day.date+'T12:00:00');
    const lbl=isToday?'Azi':isTomorrow?'Mâine':dt.toLocaleDateString('ro-RO',{weekday:'long',day:'numeric',month:'short'});
    const evs=day.events.map(ev=>{
      let time='Toată ziua';
      if(!ev.allDay){try{time=new Date(ev.start).toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Bucharest'});}catch{}}
      return `<div class="cal-event">
        <span class="cal-time">${time}</span>
        <span class="cal-name">${esc(ev.summary)}</span>
      </div>`;
    }).join('');
    return `<div class="cal-day-label ${isToday?'today':''}">${esc(lbl)}</div>${evs}`;
  }).join('');
}

// ── RENDER: Todos ──
function renderReminders(rem){
  const card=document.getElementById('reminders-card');
  const content=document.getElementById('reminders-content');
  if(!rem||!rem.lists){card.style.display='none';return;}
  const lists=Object.entries(rem.lists);
  const total=lists.reduce((s,[,v])=>s+v.filter(i=>!i.done).length,0);
  if(total===0){card.style.display='none';return;}
  card.style.display='';
  document.getElementById('reminders-tag').textContent=total+' item'+(total>1?'e':'');
  const EMOJI={Cumpărături:'🛒',Todo:'📌'};
  content.innerHTML=lists.map(([name,items])=>{
    const active=items.filter(i=>!i.done);
    if(!active.length)return'';
    const em=EMOJI[name]||'📋';
    return `<div class="todo-list-name">${em} ${esc(name)}</div>`+
      active.map(i=>`<div class="todo-item">
        <div class="todo-circle"></div>
        <span class="todo-text">${esc(i.text)}</span>
      </div>`).join('');
  }).join('');
}

// ── RENDER: Alerts ──
function renderAlerts(news){
  const items=(news&&news.items)||[];
  const dismissed=getDismissed();
  const crits=items.filter(i=>i.priority==='critical'&&!dismissed.has((i.title||'').slice(0,60)));
  const warns=items.filter(i=>i.priority==='warn'&&!dismissed.has((i.title||'').slice(0,60)));
  const el=document.getElementById('alerts');
  if(!crits.length&&!warns.length){
    el.innerHTML='<div class="alert alert-ok"><div class="alert-body"><div class="alert-title" style="color:var(--green)">Stack OK — nicio alertă critică</div></div><span class="alert-badge b-ok">OK</span></div>';
    return;
  }
  el.innerHTML=[...crits,...warns].map(item=>{
    const isc=item.priority==='critical';
    const id=(item.title||'').slice(0,60);
    const tag=item.url?'a':'div';
    const href=item.url?` href="${esc(item.url)}" target="_blank" rel="noopener"`:'';
    return `<${tag}${href} class="alert ${isc?'alert-crit':'alert-warn'}" data-aid="${esc(id)}">
      <div class="alert-body">
        <div class="alert-title">${esc(item.title)}</div>
        <div class="alert-meta">${esc(item.source)} · ${esc(item.date)}</div>
      </div>
      <span class="alert-badge ${isc?'b-crit':'b-warn'}">${isc?'CRITICAL':'WARN'}</span>
      <button class="alert-x" onclick="event.preventDefault();event.stopPropagation();dismissAlert('${id.replace(/'/g,"\\'")}')">✕</button>
    </${tag}>`;
  }).join('');
}

// ── RENDER: Upgrades ──
function renderUpgrades(upgrades){
  const sec=document.getElementById('upgrades-section');
  const list=document.getElementById('upgrades-list');
  if(!upgrades||!upgrades.items||!upgrades.items.length){sec.style.display='none';return;}
  sec.style.display='';
  const bc=upgrades.breakingCount||0;
  const meta=`${upgrades.totalOpen} PR · ${bc} breaking`;
  document.getElementById('upgrades-meta').textContent=meta;
  if(bc>0)document.getElementById('upgrades-meta').style.color='#fca5a5';
  const shown=upgrades.items.filter(i=>i.kind==='breaking'||i.kind==='minor');
  const patches=upgrades.items.filter(i=>i.kind==='patch'||i.kind==='info');
  const labels={breaking:'BREAKING',minor:'minor',patch:'patch',info:'info'};
  const bs={breaking:'upg-b-breaking',minor:'upg-b-minor',patch:'upg-b-patch',info:'upg-b-patch'};
  const ss={breaking:'upg-breaking',minor:'upg-minor',patch:'upg-patch',info:'upg-patch'};
  let html=shown.map(i=>{
    const tag=i.url?'a':'div';
    const href=i.url?` href="${esc(i.url)}" target="_blank" rel="noopener"`:'';
    return `<${tag}${href} class="upg-item ${ss[i.kind]||'upg-patch'}">
      <div style="flex:1;min-width:0">
        <div class="upg-pkg">${esc(i.package)}</div>
        <div class="upg-versions">${esc(i.fromVersion||'?')} → ${esc(i.toVersion||'?')}</div>
      </div>
      <span class="upg-badge ${bs[i.kind]||'upg-b-patch'}">${labels[i.kind]||'upg'}</span>
    </${tag}>`;
  }).join('');
  if(patches.length){
    html+=`<div class="upg-item upg-patch" style="cursor:default">
      <div style="flex:1"><div class="upg-pkg" style="color:var(--t2)">${patches.length} patch-uri</div>
      <div class="upg-versions">${patches.slice(0,6).map(p=>esc(p.package)).join(', ')}${patches.length>6?'…':''}</div></div>
      <span class="upg-badge upg-b-patch">patch</span></div>`;
  }
  list.innerHTML=html||'<div class="empty">Niciun PR deschis.</div>';
}

// ── RENDER: News ──
function renderNews(news){
  const items=(news&&news.items)||[];
  const crit=items.filter(i=>i.priority==='critical').length;
  const warn=items.filter(i=>i.priority==='warn').length;
  document.getElementById('news-meta').textContent=items.length+' articole'+(crit?' · '+crit+' critical':'')+(warn?' · '+warn+' warn':'');
  const PRIO={critical:0,warn:1,info:2};
  const sorted=[...items].sort((a,b)=>(PRIO[a.priority]??2)-(PRIO[b.priority]??2));
  if(!sorted.length){document.getElementById('news-list').innerHTML='<div class="empty">Nicio știre azi.</div>';return;}
  document.getElementById('news-list').innerHTML=sorted.map(item=>{
    const dc=item.priority==='critical'?'nd-crit':item.priority==='warn'?'nd-warn':'nd-info';
    const tag=item.url?'a':'div';
    const href=item.url?` href="${esc(item.url)}" target="_blank" rel="noopener"`:'';
    return `<${tag}${href} class="news-item">
      <div class="news-dot ${dc}" style="margin-top:5px"></div>
      <div style="flex:1;min-width:0">
        <div class="news-title">${esc(item.title)}</div>
        <div class="news-meta">${esc(item.source)} · ${esc(item.date)}</div>
      </div>
      ${item.url?'<span class="news-arr">↗</span>':''}
    </${tag}>`;
  }).join('');
}

// ── RENDER: Agents ──
function renderAgentNetwork(agents){
  const knownKeys=new Set(AGENT_DEFS.map(d=>d.key));
  const extra=agents?Object.keys(agents).filter(k=>!knownKeys.has(k)&&!k.startsWith('_')).map(k=>({key:k,icon:'🤖',name:k,role:'',schedule:null})):[];
  const defs=[...AGENT_DEFS,...extra];
  const active=defs.filter(d=>agents&&agents[d.key]&&agents[d.key].status==='ok').length;
  document.getElementById('agents-tag').textContent=active+'/'+defs.length+' ok';
  document.getElementById('agent-network').innerHTML=`<div style="display:flex;flex-direction:column;gap:8px">`+
  defs.map(def=>{
    const a=agents&&agents[def.key];
    const isOk=a&&a.status==='ok';
    const isErr=a&&a.status==='error';
    const isWarn=a&&a.status==='warn';
    const bc=isOk?'sb-ok':isErr?'sb-err':isWarn?'sb-warn':'sb-idle';
    const bt=isOk?'OK':isErr?'ERR':isWarn?'WARN':'—';
    const lastRun=fmtTime(a&&a.lastRun)||'—';
    const nextMins=def.schedule&&nextRunDate(def.schedule)?Math.round((nextRunDate(def.schedule)-new Date())/60000):9999;
    const nextTxt=def.schedule?fmtNextRun(def.schedule):'—';
    const dotCls=isOk?'dot-ok pulse':isErr?'dot-err':isWarn?'dot-warn':'dot-idle';
    const sum=a&&a.summary?a.summary:def.role||'';
    return `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:8px">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:6px">
        <div style="display:flex;align-items:center;gap:7px;min-width:0">
          <span style="font-size:16px;line-height:1;flex-shrink:0">${def.icon}</span>
          <span style="font-size:13px;font-weight:600;color:var(--t1);white-space:nowrap">${esc(def.name)}</span>
        </div>
        <span class="sbadge ${bc}" style="flex-shrink:0">${bt}</span>
      </div>
      ${sum?`<div style="font-size:12px;color:var(--t2);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${esc(sum)}</div>`:''}
      <div style="font-size:11px;color:var(--t3);display:flex;justify-content:space-between;gap:8px;padding-top:4px;border-top:1px solid var(--border)">
        <span>🕐 ${lastRun}</span>
        <span class="${nextMins<60?'agent-next soon':'agent-next'}" id="nr-${def.key}">⏱ ${nextTxt}</span>
      </div>
    </div>`;
  }).join('')+`</div>`;
}

// ── RENDER: Status bar ──
function renderStatusBar(infra,agents){
  if(!infra)return;
  const nodes=infra.nodes;
  if(nodes){
    const el=document.getElementById('sb-nodes');
    el.textContent=nodes.ready||'3/3';
    el.className='sb-value ok';
  }
  if(infra.pods){
    const u=typeof infra.pods==='object'?infra.pods.unhealthy:0;
    const el=document.getElementById('sb-pods');
    el.textContent=u===0?'OK':u+' err';
    el.className='sb-value '+(u===0?'ok':'err');
  }
  if(infra.flux){
    const el=document.getElementById('sb-flux');
    el.textContent=infra.flux.failed>0?infra.flux.failed+' fail':'OK';
    el.className='sb-value '+(infra.flux.failed>0?'err':'ok');
  }
  if(infra.disk){
    const p=parseInt(infra.disk.usage);
    const el=document.getElementById('sb-disk');
    el.textContent=infra.disk.usage;
    el.className='sb-value '+(p<60?'ok':p<80?'warn':'err');
  }
  if(infra.docker){
    const el=document.getElementById('sb-docker');
    const stopped=infra.docker.stopped||0;
    el.textContent=infra.docker.running+(stopped>0?' (+'+stopped+' off)':'');
    el.className='sb-value '+(stopped>0?'warn':'ok');
  }
  if(agents){
    const all=[...new Set([...AGENT_DEFS.map(d=>d.key),...Object.keys(agents)])].filter(k=>!k.startsWith('_'));
    const ok=all.filter(k=>agents[k]&&agents[k].status==='ok').length;
    const el=document.getElementById('sb-agents');
    el.textContent=ok+'/'+all.length;
    el.className='sb-value '+(ok===all.length?'ok':ok===0?'err':'warn');
  }
}

// ── RENDER: VPS ──
function renderVPS(infra){
  const diskPct=infra&&infra.disk?infra.disk.pct||parseInt(infra.disk.usage):0;
  const freeGB=infra&&infra.disk?fmtKB(infra.disk.free):'?';
  const memPct=infra&&infra.memory?infra.memory.pct:0;
  const memUsed=infra&&infra.memory?Math.round(infra.memory.usedMB/1024*10)/10:0;
  const memTotal=infra&&infra.memory?Math.round(infra.memory.totalMB/1024*10)/10:0;
  const cpuPct=infra&&infra.cpu?infra.cpu.pct:0;
  const docker=infra&&infra.docker;
  const stopped=docker?docker.stopped:0;

  document.getElementById('vps-tag').textContent='Oracle Cloud ARM';

  const rows=[
    {name:'CPU',    pct:cpuPct,  info:cpuPct+'%'},
    {name:'Memory', pct:memPct,  info:memUsed+'G / '+memTotal+'G · '+memPct+'%'},
    {name:'Disk /', pct:diskPct, info:freeGB+' liber · '+diskPct+'%'},
  ];
  const barsHtml=rows.map(r=>`<div class="storage-item">
    <div class="storage-hdr"><span class="storage-name">${r.name}</span><span class="storage-val">${esc(r.info)}</span></div>
    <div class="bar-track-full"><div class="bar-fill-full" style="width:${r.pct}%;background:${barColor(r.pct)}"></div></div>
  </div>`).join('');

  const dockerHtml=docker?`<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">
    <div style="font-size:11px;color:var(--t3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.7px">Docker</div>
    <div style="display:flex;gap:16px;font-size:13px">
      <span><span style="color:var(--green);font-weight:600">${docker.running}</span> <span style="color:var(--t3)">rulând</span></span>
      ${stopped>0?`<span><span style="color:var(--yellow);font-weight:600">${stopped}</span> <span style="color:var(--t3)">oprite</span></span>`:''}
    </div>
  </div>`:'';

  document.getElementById('vps-content').innerHTML=barsHtml+dockerHtml;
}

// ── RENDER: K8s Nodes ──
function renderNodes(infra){
  const metrics=(infra&&infra.nodes&&infra.nodes.metrics)||[];
  const IPS={'kubernetes-controlplane-1':'10.57.57.80','kubernetes-controlplane-2':'10.57.57.82','kubernetes-controlplane-3':'10.57.57.84'};
  const cpuAvg=metrics.length?Math.round(metrics.reduce((s,n)=>s+n.cpu,0)/metrics.length):0;
  const memAvg=metrics.length?Math.round(metrics.reduce((s,n)=>s+n.mem,0)/metrics.length):0;
  document.getElementById('infra-tag').textContent=metrics.length+' noduri · CPU avg '+cpuAvg+'%';
  document.getElementById('nodes-list').innerHTML=metrics.map(n=>{
    const short=n.name.replace('kubernetes-','');
    const ip=IPS[n.name]||'';
    return `<div class="node-item">
      <div class="dot dot-ok pulse"></div>
      <div style="flex:1;min-width:0">
        <div class="node-name">${esc(short)}</div>
        <div class="node-meta">${ip}</div>
      </div>
      <div class="node-bars">
        <div class="bar-pill"><span class="bar-lbl">CPU</span><div class="bar-track"><div class="bar-fill" style="width:${n.cpu}%;background:${barColor(n.cpu)}"></div></div><span>${n.cpu}%</span></div>
        <div class="bar-pill"><span class="bar-lbl">MEM</span><div class="bar-track"><div class="bar-fill" style="width:${n.mem}%;background:${barColor(n.mem)}"></div></div><span>${n.mem}%</span></div>
      </div>
    </div>`;
  }).join('');
}

// ── RENDER: Storage & Backup ──
function renderStorage(infra,backup){
  let html='';
  // Longhorn
  const lh=infra&&infra.longhorn;
  if(lh){
    html+=`<div class="storage-item">
      <div class="storage-hdr"><span class="storage-name">Longhorn PVCs</span><span class="storage-val">${lh.healthy}/${lh.total} healthy · ${(lh.usedG||'?')}G / ${(lh.totalG||'?')}G</span></div>`;
    const totalGNum=parseFloat(String(lh.totalG));
    const pct=totalGNum?Math.round(lh.usedG/totalGNum*100):0;
    html+=`<div class="bar-track-full"><div class="bar-fill-full" style="width:${pct}%;background:${barColor(pct)}"></div></div></div>`;
    const nodes=infra.longhornNodes||[];
    html+=nodes.map(n=>{
      const p=Math.round(n.used/n.total*100);
      const short=n.name.replace('kubernetes-','');
      return `<div class="storage-item">
        <div class="storage-hdr"><span class="storage-name" style="color:var(--t3)">${esc(short)}</span><span class="storage-val">${Math.round(n.used/1073741824)}G / ${Math.round(n.total/1073741824)}G</span></div>
        <div class="bar-track-full"><div class="bar-fill-full" style="width:${p}%;background:${barColor(p)}"></div></div>
      </div>`;
    }).join('');
  }
  // Backup services
  if(backup&&backup.services){
    const allOk=backup.services.filter(s=>s.status!=='unknown').every(s=>s.status==='ok');
    document.getElementById('bkp-tag').textContent=allOk?'OK':'Verifică';
    if(!allOk)document.getElementById('bkp-tag').style.color='var(--yellow)';
    html+=backup.services.map(s=>{
      const isOk=s.status==='ok';
      const isUnk=s.status==='unknown';
      return `<div class="node-item">
        <div class="dot ${isOk?'dot-ok pulse':isUnk?'dot-idle':'dot-err'}"></div>
        <div style="flex:1;min-width:0">
          <div class="node-name">${esc(s.name)}</div>
          <div class="node-meta">${esc(s.lastBackup||'—')}</div>
        </div>
      </div>`;
    }).join('');
  }
  document.getElementById('storage-content').innerHTML=html||'<div class="empty">No data</div>';
}

// ── LOAD ALL ──
async function loadAll(){
  cd=REFRESH;
  try{
    const[aR,iR,nR,bR,uR,wR,cR,remR]=await Promise.allSettled([
      fetchJ('/data/agents.json'),
      fetchJ('/data/infra.json'),
      fetchJ('/data/news.json'),
      fetchJ('/data/backup.json'),
      fetchJ('/data/upgrades.json'),
      fetchJ('/data/weather.json'),
      fetchJ('/data/calendar.json'),
      fetchJ('/data/todos.json'),
    ]);
    const agents  =aR.status==='fulfilled'?aR.value:null;
    const infra   =iR.status==='fulfilled'?iR.value:null;
    const news    =nR.status==='fulfilled'?nR.value:null;
    const backup  =bR.status==='fulfilled'?bR.value:null;
    const upgrades=uR.status==='fulfilled'?uR.value:null;
    const weather =wR.status==='fulfilled'?wR.value:null;
    const cal     =cR.status==='fulfilled'?cR.value:null;
    const rem     =remR.status==='fulfilled'?remR.value:null;

    renderStatusBar(infra,agents);
    renderWeather(weather);
    renderCalendar(cal);
    renderReminders(rem);
    renderAlerts(news);
    renderUpgrades(upgrades);
    renderNews(news);
    renderAgentNetwork(agents);
    renderVPS(infra);
    renderNodes(infra);
    renderStorage(infra,backup);
    updateNextRunLabels();
  }catch(e){console.error('loadAll:',e);}
}
