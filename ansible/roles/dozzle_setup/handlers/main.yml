---
- name: Restart dozzle
  when: not ansible_check_mode
  community.docker.docker_compose_v2:
    project_src: "{{ dozzle_docker_dir }}"
    state: restarted

- name: Reload traefik
  when: not ansible_check_mode
  community.docker.docker_container:
    name: traefik
    state: started
    restart: yes
