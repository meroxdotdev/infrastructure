---
- name: Create Joplin directory
  file:
    path: "{{ joplin_docker_dir }}"
    state: directory
    mode: "0755"

- name: Deploy Joplin docker-compose.yml
  template:
    src: docker-compose.yml.j2
    dest: "{{ joplin_docker_dir }}/docker-compose.yml"
    mode: "0644"
  no_log: true
  notify: Restart joplin

- name: Start Joplin containers
  community.docker.docker_compose_v2:
    project_src: "{{ joplin_docker_dir }}"
    state: present
  when: not ansible_check_mode

- name: Wait for Joplin to be ready
  wait_for:
    port: "{{ joplin_app_port }}"
    host: localhost
    delay: 10
    timeout: 120
