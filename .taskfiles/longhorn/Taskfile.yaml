---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

vars:
  LONGHORN_NS: longhorn-system

tasks:
  restore:
    desc: Restore Longhorn volumes from S3 backup (run AFTER bootstrap:apps, BEFORE apps reconcile)
    summary: |
      Full Phase 2 Longhorn restore procedure for Longhorn 1.11.2+.

      Run ONCE after: task bootstrap:apps
      Run BEFORE:     Flux reconciles any app HelmReleases

      What it does:
        1. Patches the BackupTarget CRD (required in 1.11.2 — no longer a Setting)
        2. Waits for BackupVolumes to sync from S3
        3. Creates restore Volume CRDs in longhorn-system (fromBackup)
        4. Waits for replicas to initialize
        5. Applies pvs.yaml with correct claimRefs
        6. Removes duplicate default/longhorn HelmRelease if present
        7. Creates prometheus + alertmanager PVCs manually (StatefulSet quirk)
        8. Force-reconciles all app HelmReleases

      After this task: all pods should start within ~5 min.
    cmds:
      - task: patch-backup-target
      - task: wait-for-backup-volumes
      - task: restore-all-volumes
      - task: wait-for-replicas
      - task: apply-pvs
      - task: fix-pvc-ownership
      - task: fix-duplicate-longhorn
      - task: create-statefulset-pvcs
      - task: reconcile-apps
      - echo ""
      - echo "✓ Longhorn restore complete. Watch pods start:"
      - echo "  kubectl get pods -A --watch"

  patch-backup-target:
    desc: Patch Longhorn BackupTarget CRD (required in Longhorn 1.11.2+)
    cmds:
      - |
        echo "→ Patching BackupTarget CRD..."
        kubectl patch backuptarget default -n {{.LONGHORN_NS}} --type merge \
          -p '{"spec":{"backupTargetURL":"s3://longhorn@us-east-1/","credentialSecret":"minio-secret","pollInterval":"300s"}}' 2>/dev/null \
          && echo "  ✓ BackupTarget patched" \
          || echo "  ✓ BackupTarget already configured"
    silent: true

  wait-for-backup-volumes:
    desc: Wait until BackupVolumes sync from S3 (~30-60s after BackupTarget patch)
    cmds:
      - |
        echo "→ Waiting for BackupVolumes to sync from S3..."
        for i in $(seq 1 30); do
          COUNT=$(kubectl get backupvolumes.longhorn.io -n {{.LONGHORN_NS}} 2>/dev/null | grep -c "restored" || true)
          if [ "$COUNT" -ge 8 ]; then
            echo "  ✓ $COUNT backup volumes found"
            break
          fi
          echo "  ... $COUNT/8+ found, waiting 10s (attempt $i/30)"
          sleep 10
        done
        COUNT=$(kubectl get backupvolumes.longhorn.io -n {{.LONGHORN_NS}} 2>/dev/null | grep -c "restored" || true)
        if [ "$COUNT" -lt 8 ]; then
          echo "  ✗ Only $COUNT backup volumes found after 5 min. Check S3 connectivity."
          echo "    kubectl get backupvolumes.longhorn.io -n {{.LONGHORN_NS}}"
          exit 1
        fi
    silent: true

  restore-all-volumes:
    desc: Create all restore Volume CRDs in longhorn-system
    cmds:
      - task: restore-volume
        vars: { NAME: jellyfin-restored }
      - task: restore-volume
        vars: { NAME: jellyseerr-restored }
      - task: restore-volume
        vars: { NAME: prowlarr-restored }
      - task: restore-volume
        vars: { NAME: qbittorrent-restored }
      - task: restore-volume
        vars: { NAME: radarr-restored }
      - task: restore-volume
        vars: { NAME: sonarr-restored }
      - task: restore-volume
        vars: { NAME: loki-restored }
      - task: restore-volume
        vars: { NAME: prometheus-restored }
      - task: restore-volume
        vars: { NAME: grafana-restored }
      # n8n is disabled by default; uncomment if enabled in default/kustomization.yaml:
      # - task: restore-volume
      #   vars: { NAME: n8n-restored }

  restore-volume:
    internal: true
    desc: Create a single restore Volume CRD from latest S3 backup
    vars:
      NAME: '{{.NAME}}'
    cmds:
      - |
        echo "→ Restoring {{.NAME}}..."

        # Find BackupVolume for this volume (name format: {volume-name}-{hash})
        BV_NAME=$(kubectl get backupvolumes.longhorn.io -n {{.LONGHORN_NS}} \
          --no-headers 2>/dev/null | awk '{print $1}' | grep "^{{.NAME}}-" | head -1)

        if [ -z "$BV_NAME" ]; then
          echo "  ✗ No BackupVolume found for {{.NAME}} — skipping"
          echo "    Check: kubectl get backupvolumes.longhorn.io -n {{.LONGHORN_NS}}"
          exit 0
        fi

        # Get latest backup URL from BackupVolume status (Longhorn 1.12.0+: lastBackupURL removed)
        BACKUP_NAME=$(kubectl get backupvolumes.longhorn.io -n {{.LONGHORN_NS}} "$BV_NAME" \
          -o jsonpath='{.status.lastBackupName}' 2>/dev/null)
        BACKUP_URL=""
        if [ -n "$BACKUP_NAME" ]; then
          BACKUP_URL=$(kubectl get backups.longhorn.io "$BACKUP_NAME" -n {{.LONGHORN_NS}} \
            -o jsonpath='{.status.url}' 2>/dev/null)
        fi

        if [ -z "$BACKUP_URL" ]; then
          echo "  ✗ No backup URL in BackupVolume $BV_NAME — skipping"
          exit 0
        fi

        SIZE=$(kubectl get backupvolumes.longhorn.io -n {{.LONGHORN_NS}} "$BV_NAME" \
          -o jsonpath='{.status.size}' 2>/dev/null)

        echo "  backup: $BACKUP_URL"

        # Check if Volume already exists
        if kubectl get volumes.longhorn.io {{.NAME}} -n {{.LONGHORN_NS}} &>/dev/null; then
          echo "  ✓ Volume already exists, skipping"
          exit 0
        fi

        # Create Volume CRD in longhorn-system (NOT in default — manager ignores default)
        kubectl apply -f - <<EOF
        apiVersion: longhorn.io/v1beta2
        kind: Volume
        metadata:
          name: {{.NAME}}
          namespace: {{.LONGHORN_NS}}
        spec:
          numberOfReplicas: 3
          frontend: blockdev
          fromBackup: "$BACKUP_URL"
          restoreVolumeRecurringJob: enabled
          accessMode: rwo
          dataEngine: v1
        EOF
        echo "  ✓ Volume {{.NAME}} restore initiated"
    silent: true

  wait-for-replicas:
    desc: Wait until all restore volumes have replicas initialized (~60s)
    cmds:
      - |
        echo "→ Waiting for restore volume replicas to initialize..."
        VOLUMES="jellyfin-restored jellyseerr-restored prowlarr-restored qbittorrent-restored radarr-restored sonarr-restored loki-restored prometheus-restored grafana-restored"
        for i in $(seq 1 12); do
          ALL_READY=true
          for VOL in $VOLUMES; do
            REPLICA_COUNT=$(kubectl get replicas.longhorn.io -n {{.LONGHORN_NS}} \
              --no-headers 2>/dev/null | grep "^${VOL}-" | wc -l)
            if [ "$REPLICA_COUNT" -lt 1 ]; then
              ALL_READY=false
              break
            fi
          done
          if $ALL_READY; then
            echo "  ✓ All restore volumes have replicas"
            break
          fi
          echo "  ... replicas not all ready yet (attempt $i/12)"
          sleep 10
        done
    silent: true

  apply-pvs:
    desc: Apply PersistentVolume manifests with correct claimRefs
    cmds:
      - |
        echo "→ Applying PV manifests..."
        kubectl apply -k kubernetes/apps/storage/restore-pvs/
        echo "  ✓ PVs applied"
        echo "  Waiting 10s for PVs to register..."
        sleep 10
        echo "  PV status:"
        kubectl get pv 2>/dev/null | grep restored | awk '{print "   "$1, $5, $6}'
    silent: true

  fix-pvc-ownership:
    desc: Transfer volumeName field ownership from kustomize-controller to stable pvc-owner manager
    summary: |
      After pvs.yaml binds PVCs to restored PVs, kustomize-controller (Flux SSA) may have
      previously owned the volumeName field (from an old pvc.yaml that had volumeName hardcoded).
      When the new pvc.yaml omits volumeName, Flux tries to delete it → immutability error.

      This task re-asserts volumeName with field-manager=pvc-owner so Flux can safely release
      its ownership without triggering the immutable spec constraint.
    cmds:
      - |
        echo "→ Fixing PVC field ownership to prevent Flux SSA volumeName conflicts..."
        for pvc_item in "default:jellyfin" "default:jellyseerr" "default:prowlarr" "default:qbittorrent" "default:radarr" "default:sonarr"; do
          NS=${pvc_item%%:*}
          PVC=${pvc_item##*:}
          VOL=$(kubectl get pvc "$PVC" -n "$NS" -o jsonpath='{.spec.volumeName}' 2>/dev/null)
          SIZE=$(kubectl get pvc "$PVC" -n "$NS" -o jsonpath='{.spec.resources.requests.storage}' 2>/dev/null)
          if [ -z "$VOL" ]; then
            echo "  ✓ $PVC: no volumeName (dynamic), skipping"
            continue
          fi
          kubectl apply --server-side --field-manager=pvc-owner -f - <<PVEOF
        apiVersion: v1
        kind: PersistentVolumeClaim
        metadata:
          name: $PVC
          namespace: $NS
        spec:
          accessModes: [ReadWriteOnce]
          storageClassName: longhorn
          resources:
            requests:
              storage: $SIZE
          volumeName: $VOL
        PVEOF
          echo "  ✓ $PVC: pvc-owner now holds volumeName=$VOL"
        done
    silent: true

  fix-duplicate-longhorn:
    desc: Remove spurious default/longhorn HelmRelease (created by Longhorn 1.11.2 namespace-scoped feature)
    cmds:
      - |
        echo "→ Ensuring deleting-confirmation-flag is set (required for uninstall)..."
        kubectl patch setting deleting-confirmation-flag -n longhorn-system --type=merge -p '{"value":"true"}' 2>/dev/null || \
          kubectl apply -f <(printf 'apiVersion: longhorn.io/v1beta2\nkind: Setting\nmetadata:\n  name: deleting-confirmation-flag\n  namespace: longhorn-system\nvalue: "true"\n') 2>/dev/null || true

        echo "→ Checking for duplicate default/longhorn HelmRelease..."
        if kubectl get helmrelease longhorn -n default &>/dev/null; then
          echo "  ! Found duplicate default/longhorn — removing..."
          kubectl patch helmrelease longhorn -n default -p '{"metadata":{"finalizers":[]}}' --type=merge 2>/dev/null || true
          kubectl delete helmrelease longhorn -n default --force --grace-period=0 2>/dev/null || true
          helm uninstall longhorn -n default 2>/dev/null || true
          # Force-delete deployments/daemonsets left behind
          kubectl delete deployment csi-attacher csi-provisioner csi-resizer \
            csi-snapshotter longhorn-driver-deployer longhorn-ui \
            -n default --ignore-not-found 2>/dev/null || true
          kubectl delete daemonset longhorn-manager longhorn-csi-plugin \
            -n default --ignore-not-found 2>/dev/null || true
          echo "  ✓ Duplicate removed"

          echo "  → Restarting longhorn-csi-plugin to re-register CSI driver..."
          kubectl rollout restart daemonset/longhorn-csi-plugin -n {{.LONGHORN_NS}}
          kubectl rollout status daemonset/longhorn-csi-plugin -n {{.LONGHORN_NS}} --timeout=60s

          echo "  Verifying driver.longhorn.io registered on nodes..."
          for i in $(seq 1 10); do
            REGISTERED=$(kubectl get csinodes -o json 2>/dev/null | \
              python3 -c "import json,sys; d=json.load(sys.stdin); \
              nodes=[n for n in d['items'] if any(drv['name']=='driver.longhorn.io' for drv in n['spec']['drivers'])]; \
              print(len(nodes))" 2>/dev/null || echo 0)
            if [ "$REGISTERED" -eq 3 ]; then
              echo "  ✓ driver.longhorn.io registered on all 3 nodes"
              break
            fi
            echo "  ... registered on $REGISTERED/3 nodes (attempt $i/10)"
            sleep 6
          done
        else
          echo "  ✓ No duplicate found"
        fi
    silent: true

  create-statefulset-pvcs:
    desc: Create/rebind PVCs for StatefulSets and Deployments that Flux cannot pre-create (prometheus, alertmanager, grafana, loki)
    summary: |
      Helm-managed PVCs (grafana, loki, prometheus) are created dynamically by their
      HelmReleases after bootstrap. By the time apply-pvs runs, Flux may have already
      bound them to dynamic PVs, bypassing the restored PVs.

      This task forces correct binding by:
      - Creating the PVC if it does not exist (simple path)
      - Rebinding to the restored PV if currently bound to a dynamic PV (scale down → delete → recreate)

      Must run BEFORE reconcile-apps so HelmReleases see the correct PVCs on startup.
    cmds:
      - |
        echo "→ Creating/rebinding StatefulSet and Deployment PVCs..."

        # Helper: bind a PVC to a specific restored PV, rebinding if necessary
        bind_pvc() {
          local PVC=$1 NS=$2 PV=$3 SIZE=$4 SCALEDOWN_TYPE=$5 SCALEDOWN_NAME=$6

          CURRENT_VOL=$(kubectl get pvc "$PVC" -n "$NS" -o jsonpath='{.spec.volumeName}' 2>/dev/null || true)

          if [ "$CURRENT_VOL" = "$PV" ]; then
            echo "  ✓ $PVC already bound to $PV"
            return
          fi

          if [ -n "$CURRENT_VOL" ]; then
            echo "  ! $PVC bound to dynamic PV ($CURRENT_VOL) — rebinding to $PV..."
            if [ -n "$SCALEDOWN_TYPE" ] && [ -n "$SCALEDOWN_NAME" ]; then
              kubectl scale "$SCALEDOWN_TYPE" "$SCALEDOWN_NAME" -n "$NS" --replicas=0 2>/dev/null || true
              sleep 5
            fi
            kubectl delete pvc "$PVC" -n "$NS" --ignore-not-found 2>/dev/null || true
            sleep 2
          fi

          kubectl apply -f - <<PVEOF
        apiVersion: v1
        kind: PersistentVolumeClaim
        metadata:
          name: $PVC
          namespace: $NS
        spec:
          accessModes: [ReadWriteOnce]
          storageClassName: longhorn
          volumeName: $PV
          resources:
            requests:
              storage: $SIZE
        PVEOF
          echo "  ✓ $PVC → $PV"
        }

        # Prometheus (StatefulSet — controller does not recreate deleted PVCs)
        bind_pvc \
          "prometheus-kube-prometheus-stack-db-prometheus-kube-prometheus-stack-0" \
          "observability" \
          "prometheus-restored-pv" \
          "15Gi" \
          "" ""

        # Grafana (Deployment — Flux creates PVC dynamically at HelmRelease install)
        bind_pvc \
          "grafana" \
          "observability" \
          "grafana-restored-pv" \
          "10Gi" \
          "deployment" "grafana"

        # Loki (StatefulSet singleBinary — same timing issue as grafana)
        bind_pvc \
          "storage-loki-0" \
          "observability" \
          "loki-restored-pv" \
          "20Gi" \
          "statefulset" "loki"

        # Alertmanager (fresh empty volume — no backup needed)
        if ! kubectl get pvc alertmanager-kube-prometheus-stack-db-alertmanager-kube-prometheus-stack-0 \
            -n observability &>/dev/null; then
          kubectl apply -f - <<EOF
        apiVersion: v1
        kind: PersistentVolumeClaim
        metadata:
          name: alertmanager-kube-prometheus-stack-db-alertmanager-kube-prometheus-stack-0
          namespace: observability
        spec:
          accessModes: [ReadWriteOnce]
          storageClassName: longhorn
          resources:
            requests:
              storage: 1Gi
        EOF
          echo "  ✓ alertmanager PVC created (fresh, no backup)"
        else
          echo "  ✓ alertmanager PVC already exists"
        fi
    silent: true

  reconcile-apps:
    desc: Force-reconcile all app kustomizations and HelmReleases
    cmds:
      - |
        echo "→ Force-reconciling Flux kustomizations..."
        flux reconcile kustomization cluster-apps 2>/dev/null || true
        sleep 5

        echo "→ Reconciling app Kustomizations (creates cache PVCs + HelmReleases)..."
        for app in jellyfin jellyseerr prowlarr qbittorrent radarr sonarr; do
          flux reconcile kustomization $app -n default 2>/dev/null &
        done
        wait

        echo "→ Reconciling media stack HelmReleases..."
        for app in jellyfin jellyseerr prowlarr qbittorrent radarr sonarr; do
          flux reconcile helmrelease $app -n default 2>/dev/null &
        done
        wait

        echo "→ Reconciling observability HelmReleases..."
        for app in grafana loki kube-prometheus-stack; do
          flux reconcile helmrelease $app -n observability 2>/dev/null &
        done
        wait

        echo "  ✓ Reconciliation triggered"
        echo "  Monitor with: kubectl get helmreleases -A"
    silent: true

  status:
    desc: Check status of restore volumes and app pods
    cmds:
      - |
        echo "=== Longhorn Volumes ==="
        kubectl get volumes.longhorn.io -n {{.LONGHORN_NS}} 2>/dev/null | grep restored
        echo ""
        echo "=== PV Bindings ==="
        kubectl get pv 2>/dev/null | grep restored
        echo ""
        echo "=== PVCs ==="
        kubectl get pvc -A 2>/dev/null | grep -v Bound | grep -v NAME
        echo ""
        echo "=== Failed HelmReleases ==="
        kubectl get helmreleases -A 2>/dev/null | grep -v "True\|READY"

  clean-orphan-volumes:
    desc: Delete leftover faulted pvc-xxxx volumes from default namespace (safe to run after restore)
    cmds:
      - |
        echo "→ Cleaning orphan faulted volumes from default namespace..."
        VOLS=$(kubectl get volumes.longhorn.io -n default --no-headers 2>/dev/null \
          | grep -E "faulted|creating" | awk '{print $1}')
        if [ -z "$VOLS" ]; then
          echo "  ✓ No orphan volumes found"
          exit 0
        fi
        for v in $VOLS; do
          echo "  Removing finalizer + deleting: $v"
          kubectl patch volumes.longhorn.io $v -n default \
            -p '{"metadata":{"finalizers":[]}}' --type=merge 2>/dev/null || true
          kubectl delete volumes.longhorn.io $v -n default --ignore-not-found 2>/dev/null || true
        done
        echo "  ✓ Done"
    silent: true
