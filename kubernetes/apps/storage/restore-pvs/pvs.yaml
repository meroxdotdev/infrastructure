---
# Legacy: prometheus still runs on the volume restored during the 2026-06-06
# DR test. Prometheus is no longer backed up — on the next DR this PV must NOT
# be applied; the restore task creates a fresh PVC instead. Drop this block
# whenever prometheus gets recreated on a dynamic volume.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: prometheus-restored-pv
spec:
  accessModes:
    - ReadWriteOnce
  capacity:
    storage: 15Gi
  claimRef:
    apiVersion: v1
    kind: PersistentVolumeClaim
    name: prometheus-kube-prometheus-stack-db-prometheus-kube-prometheus-stack-0
    namespace: observability
  csi:
    driver: driver.longhorn.io
    fsType: ext4
    volumeAttributes:
      numberOfReplicas: "3"
      staleReplicaTimeout: "30"
    volumeHandle: prometheus-restored
  persistentVolumeReclaimPolicy: Retain
  storageClassName: longhorn
