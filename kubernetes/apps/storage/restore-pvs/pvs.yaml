---
# PersistentVolumes pointing to named Longhorn volumes.
# These are created AFTER running: task restore:longhorn
# which restores each volume from S3 backup with the exact name in volumeHandle.
#
# Cache volumes (jellyfin-cache, sonarr-cache, etc.) are NOT here
# because they are ephemeral and recreated empty automatically.
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyfin-restored-pv
spec:
  accessModes:
    - ReadWriteOnce
  capacity:
    storage: 10Gi
  csi:
    driver: driver.longhorn.io
    fsType: ext4
    volumeAttributes:
      numberOfReplicas: "3"
      staleReplicaTimeout: "30"
    volumeHandle: jellyfin-restored
  persistentVolumeReclaimPolicy: Retain
  storageClassName: longhorn
