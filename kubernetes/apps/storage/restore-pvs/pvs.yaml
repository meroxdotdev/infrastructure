---
# PersistentVolumes pointing to named Longhorn volumes.
# These are created AFTER running: task longhorn:restore
# which restores each volume from S3 backup with the exact name in volumeHandle.
#
# Only media/ARR config volumes are backed up (PVC label
# recurring-job-group.longhorn.io/media) and therefore restorable.
# Cache volumes, observability (prometheus/loki/grafana/alertmanager) and
# netdata are deliberately NOT backed up — they start empty after DR via
# dynamic provisioning.
# Post-restore, run: task longhorn:post-restore-jellyfin
# Jellyfin images re-download automatically in ~10 min after that task runs.
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyfin-restored-pv
spec:
  accessModes:
    - ReadWriteOnce
  capacity:
    storage: 10Gi
  claimRef:
    apiVersion: v1
    kind: PersistentVolumeClaim
    name: jellyfin
    namespace: default
  csi:
    driver: driver.longhorn.io
    fsType: ext4
    volumeAttributes:
      numberOfReplicas: "3"
      staleReplicaTimeout: "30"
    volumeHandle: jellyfin-restored
  persistentVolumeReclaimPolicy: Retain
  storageClassName: longhorn
