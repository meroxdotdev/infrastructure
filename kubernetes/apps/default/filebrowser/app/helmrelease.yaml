---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: filebrowser
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      filebrowser:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          # FILEBROWSER_ADMIN_PASSWORD alone is unreliable in this image (see
          # gtsteffaniak/filebrowser#625 — password resets/DB-lock issues
          # setting credentials while the main process holds the sqlite db
          # open). Setting the admin user via CLI in an initContainer runs
          # sequentially before the main container opens the database, is
          # idempotent (safe on every restart), and needs no manual/ad-hoc
          # fixup outside git.
          set-admin-password:
            image:
              repository: docker.io/gtstef/filebrowser
              tag: stable
            envFrom:
              - secretRef:
                  name: filebrowser-secret
            env:
              # The `set` subcommand's own -c flag does NOT override the
              # config path lookup (tested directly) — FILEBROWSER_CONFIG
              # env var is what actually works, same as the main container.
              FILEBROWSER_CONFIG: /config/config.yaml
            command:
              - sh
              - -c
              - /home/filebrowser/filebrowser set -u "admin,$FILEBROWSER_ADMIN_PASSWORD" -a
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
        containers:
          app:
            image:
              repository: docker.io/gtstef/filebrowser
              tag: stable
            env:
              TZ: Europe/Bucharest
              FILEBROWSER_CONFIG: /config/config.yaml
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 80
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 50m
              limits:
                # 256Mi was sized for "trivial single-container app" and was
                # wrong — this fork builds an in-memory index of every file
                # across all sources, and synology-home alone has ~108k
                # files. Confirmed via OOMKilled (exit 137) crash loop that
                # left large sources permanently mid-index/empty-looking.
                memory: 1Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "files.k8s.merox.dev"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
    persistence:
      config:
        existingClaim: filebrowser
        globalMounts:
          - path: /home/filebrowser/data
      static-config:
        type: configMap
        name: filebrowser-config
        globalMounts:
          - path: /config/config.yaml
            subPath: config.yaml
            readOnly: true
      library:
        type: nfs
        # Deliberately hardcoded, not ${NFS_SERVER}: Filebrowser's whole
        # purpose is browsing what's on the R730xd SAS pool specifically,
        # independent of wherever the arr-stack apps' shared NFS_SERVER var
        # currently points during the Synology->SAS media migration.
        server: "10.57.57.250"
        path: /media/library
        globalMounts:
          - path: /srv/media
      backups:
        type: nfs
        # Deliberately hardcoded, not ${NFS_SERVER}: Filebrowser's whole
        # purpose is browsing what's on the R730xd SAS pool specifically,
        # independent of wherever the arr-stack apps' shared NFS_SERVER var
        # currently points during the Synology->SAS media migration.
        server: "10.57.57.250"
        path: /media/backups
        globalMounts:
          - path: /srv/backups
            readOnly: true
      photos:
        type: nfs
        # Deliberately hardcoded, see library/backups above. Read-only:
        # this is Immich's own managed storage, browsing only.
        server: "10.57.57.250"
        path: /media/photos
        globalMounts:
          - path: /srv/photos
            readOnly: true
      isos:
        type: nfs
        # Deliberately hardcoded, see library/backups above.
        server: "10.57.57.250"
        path: /media/isos
        globalMounts:
          - path: /srv/isos
            readOnly: true
