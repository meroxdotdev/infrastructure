---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: default
components:
  - ../../components/common
patches:
  # The 'common' component provides a placeholder Namespace (named "not-used"
  # pre-rename, renamed to this kustomization's target namespace) — this
  # merges PodSecurity labels onto it rather than declaring a second,
  # colliding Namespace/default resource (which broke `cluster-apps`'s
  # kustomize build). Must target the pre-rename name "not-used": patches
  # are matched before the namespace transform runs.
  - path: ./namespace.yaml
    target:
      kind: Namespace
      name: not-used
resources:
  # Dashboard
  # Media Stack
  - ./jellyfin/ks.yaml
  - ./jellyseerr/ks.yaml
  - ./prowlarr/ks.yaml
  - ./qbittorrent/ks.yaml
  - ./radarr/ks.yaml
  - ./sonarr/ks.yaml
  # Photos
  - ./immich/ks.yaml
  # File management
  - ./filebrowser/ks.yaml
  # Automation (disabled - uncomment to re-enable)
  # - ./n8n/ks.yaml
  # Monitoring
  - ./netdata/ks.yaml
  # Management
  - ./headlamp/ks.yaml
  - ./portainer-agent/ks.yaml
  # Auth
  - ./authentik-outpost/ks.yaml

