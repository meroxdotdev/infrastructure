---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app qbittorrent
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      qbittorrent:
        containers:
          gluetun:
            image:
              repository: ghcr.io/qdm12/gluetun
              tag: v3.41.1
            env:
              TZ: Europe/Bucharest
              VPN_SERVICE_PROVIDER: surfshark
              VPN_TYPE: wireguard
              SERVER_COUNTRIES: Netherlands,Germany,Sweden,Switzerland
              WIREGUARD_ADDRESSES: "10.14.0.2/16"
              FIREWALL_INPUT_PORTS: "50413,80"
              FIREWALL_OUTBOUND_SUBNETS: "10.0.0.0/8"
              DNS_KEEP_NAMESERVER: "on"
              DOT: "off"
              WIREGUARD_IMPLEMENTATION: userspace
              VPN_IPV6_DISABLED: "on"
              # Refresh server list every 24h so Gluetun picks healthy servers
              UPDATER_PERIOD: 24h
              # Don't let Gluetun's blocker interfere with tracker/peer traffic
              BLOCK_MALICIOUS: "off"
              BLOCK_SURVEILLANCE: "off"
            envFrom:
              - secretRef:
                  name: qbittorrent-gluetun-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["/bin/sh", "-c", "wget -qO /dev/null http://127.0.0.1:9999"]
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 3
            securityContext:
              runAsNonRoot: false
              runAsUser: 0
              capabilities:
                add: ["NET_ADMIN"]
              allowPrivilegeEscalation: false
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                memory: 128Mi
          app:
            image:
              repository: ghcr.io/home-operations/qbittorrent
              tag: 5.2.0@sha256:788796013c3da75f2dba568c5319975a5c41f555586dfd13987be4631181e00e
            env:
              TZ: Europe/Bucharest
              QBT_WEBUI_PORT: &port 80
              QBT_TORRENTING_PORT: &torrentPort 50413
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                spec:
                  tcpSocket:
                    port: *port
                  initialDelaySeconds: 5
                  failureThreshold: 30
                  periodSeconds: 5
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 2Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        forceRename: *app
        primary: true
        ports:
          http:
            port: *port
      bittorrent:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: ${LB_IP_QBITTORRENT}
        ports:
          bittorrent-tcp:
            port: *torrentPort
            protocol: TCP
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.k8s.merox.dev"
          - qb.k8s.merox.dev
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      config:
        existingClaim: qbittorrent
      media:
        type: nfs
        server: ${NFS_SERVER}
        path: /volume1/Server/Kubernetes/Media
        globalMounts:
          - path: /media/Downloads/qbittorrent
            subPath: Downloads/qbittorrent
      tmp:
        type: emptyDir