---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app qbittorrent
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      qbittorrent:
        containers:
          gluetun:
            image:
              repository: ghcr.io/qdm12/gluetun
              tag: v3.40.0
            env:
              TZ: Europe/Bucharest
              VPN_SERVICE_PROVIDER: surfshark
              VPN_TYPE: wireguard
              # SurfShark server selection — change country as needed
              SERVER_COUNTRIES: Netherlands
              WIREGUARD_ADDRESSES: "10.14.0.2/16"
              # Allow inbound bittorrent connections through Gluetun firewall
              FIREWALL_INPUT_PORTS: "50413,80"
              # Bypass VPN for Kubernetes internal traffic (services, NFS, probes)
              FIREWALL_OUTBOUND_SUBNETS: "10.0.0.0/8"
              # Use cluster DNS instead of Gluetun's own resolver
              DNS_KEEP_NAMESERVER: "on"
              DOT: "off"
            envFrom:
              - secretRef:
                  name: qbittorrent-gluetun-secret
            securityContext:
              runAsNonRoot: false
              runAsUser: 0
              capabilities:
                add: ["NET_ADMIN"]
              allowPrivilegeEscalation: false
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                memory: 128Mi
          app:
            image:
              repository: ghcr.io/home-operations/qbittorrent
              tag: 5.1.4@sha256:bb82ad6668f8eda1d0fcce6c1341498bfa879155bb1295cd9d314a2c35c07a01
            env:
              TZ: Europe/Bucharest
              QBT_WEBUI_PORT: &port 80
              QBT_TORRENTING_PORT: &torrentPort 50413
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                spec:
                  tcpSocket:
                    port: *port
                  initialDelaySeconds: 5
                  failureThreshold: 30
                  periodSeconds: 5
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 2Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        forceRename: *app
        primary: true
        ports:
          http:
            port: *port
      bittorrent:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: ${LB_IP_QBITTORRENT}
        ports:
          bittorrent-tcp:
            port: *torrentPort
            protocol: TCP
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.k8s.merox.dev"
          - qb.k8s.merox.dev
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      config:
        existingClaim: qbittorrent
      media:
        type: nfs
        server: ${NFS_SERVER}
        path: /volume1/Server/Kubernetes/Media
        globalMounts:
          - path: /media/Downloads/qbittorrent
            subPath: Downloads/qbittorrent
      tun:
        type: hostPath
        hostPath: /dev/net/tun
        advancedMounts:
          qbittorrent:
            gluetun:
              - path: /dev/net/tun
      tmp:
        type: emptyDir