apiVersion: kustomize.config.k8s.io/v1beta1
configMapGenerator:
- files:
  - prowlarr.yaml=./lokirule.yaml
  name: prowlarr-loki-rules
  options:
    labels:
      loki_rule: "true"
generatorOptions:
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
  disableNameSuffixHash: true
kind: Kustomization
namespace: default
resources:
- ./pvc.yaml
- ./helmrelease.yaml
