---
# yaml-language-server: $schema=https://raw.githubusercontent.com/immich-app/immich-charts/main/charts/immich/values.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: immich
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      main:
        containers:
          main:
            env:
              TZ: Europe/Bucharest
              DB_HOSTNAME: immich-postgres
              DB_USERNAME: immich
              DB_DATABASE_NAME: immich
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: immich-postgres-secret
                    key: password

    # Bundled Valkey (Redis fork) — job queue + cache, ephemeral is fine.
    valkey:
      enabled: true

    # ML (face/object detection, smart search) deliberately off to stay light —
    # see docs/immich-post-restore.md for how to re-enable later if wanted.
    machine-learning:
      enabled: false

    immich:
      persistence:
        library:
          existingClaim: immich-library

    server:
      enabled: true
      controllers:
        main:
          containers:
            main:
              resources:
                requests:
                  cpu: 100m
                limits:
                  memory: 4Gi
      route:
        main:
          hostnames:
            - "photos.k8s.merox.dev"
          parentRefs:
            - name: internal
              namespace: kube-system
              sectionName: https
      persistence:
        external-library:
          type: nfs
          # Hardcoded, see pvc.yaml for why.
          server: "10.57.57.250"
          path: /media/photos/external
          globalMounts:
            - path: /mnt/external-library
              readOnly: true
