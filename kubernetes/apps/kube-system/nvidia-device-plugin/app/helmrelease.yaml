---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/source-toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: nvidia-device-plugin
spec:
  interval: 5m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 0.19.3
  url: oci://ghcr.io/home-operations/charts-mirror/nvidia-device-plugin
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nvidia-device-plugin
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: nvidia-device-plugin
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    # Chart's default nodeAffinity expects NFD labels we don't run (NFD isn't
    # deployed). We label GPU nodes manually in talconfig.yaml instead:
    #   nvidia.com/gpu: "true"            -> matches nodeSelector below
    #   nvidia.com/gpu.present: "true"    -> satisfies the chart's built-in
    #                                        nodeAffinity OR-term
    nodeSelector:
      nvidia.com/gpu: "true"
    runtimeClassName: nvidia
